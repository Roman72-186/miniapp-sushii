services:
  app:
    build: .
    restart: always
    env_file: .env
    volumes:
      - app-data:/app/data
    expose:
      - "3001"
    networks:
      - sushii-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    depends_on:
      app:
        condition: service_healthy
    networks:
      - sushii-network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    networks:
      - sushii-network

networks:
  sushii-network:
    driver: bridge

volumes:
  app-data:
  certbot-etc:
  certbot-var:
