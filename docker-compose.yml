services:
  app:
    build: .
    restart: always
    env_file: .env
    volumes:
      - app-data:/app/data
    expose:
      - "3001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - sushii-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    depends_on:
      - app
    networks:
      - sushii-network
    command: >
      sh -c "sleep 5 && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    networks:
      - sushii-network

networks:
  sushii-network:
    driver: bridge

volumes:
  app-data:
  certbot-etc:
  certbot-var:
