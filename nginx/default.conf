# Rate limiting для auth/admin-эндпоинтов — защита от перебора пароля
# (у /api/admin/login вообще нет своего лимита на уровне приложения,
# у /api/auth/login-with-password тоже; /api/auth/login-by-phone уже
# лимитируется в самом коде — здесь добавляем IP-лимит как ещё один слой).
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
# nginx по умолчанию отвечает 503 при превышении лимита — семантически
# правильнее 429 Too Many Requests (503 обычно читают мониторинги как «сервис лёг»).
limit_req_status 429;

# HTTP - редирект на HTTPS
server {
    listen 80;
    server_name sushi-house-39.ru;
    client_max_body_size 10m;

    # Let's Encrypt challenge должен открываться по HTTP до редиректа.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    client_max_body_size 10m;
    server_name sushi-house-39.ru;

    # SSL сертификаты
    ssl_certificate /etc/letsencrypt/live/sushi-house-39.ru-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sushi-house-39.ru-0001/privkey.pem;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Docker DNS — динамическое разрешение upstream (не падать если app ещё не готов)
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream app:3001;

    # Security-заголовки.
    # X-Frame-Options сознательно не выставляем: сайт открывается как Telegram
    # Mini App внутри iframe на web.telegram.org, а XFO не умеет перечислить
    # несколько разрешённых origin (только DENY/SAMEORIGIN). Ограничение
    # embedding делает frame-ancestors в CSP ниже.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://mc.yandex.ru https://mc.yandex.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://mc.yandex.ru https://mc.yandex.com; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com wss://mc.yandex.com; frame-src 'none'; frame-ancestors 'self' https://web.telegram.org https://*.web.telegram.org; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth/admin-логин — точечный rate limit поверх общего /api/ и /admin/
    # (exact-match location всегда приоритетнее prefix-match, порядок в файле
    # не важен).
    location = /api/auth/login-by-phone {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/auth/login-with-password {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/admin/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Баннеры — без кэша (загружаются через админку, часто меняются)
    #
    # add_header в location не наследует одноимённые директивы из server,
    # если в самом location уже есть свой add_header (здесь и в двух блоках
    # ниже — Cache-Control) — поэтому security-заголовки продублированы,
    # иначе они молча пропадут именно в этих трёх местах.
    location ^~ /data/banners/ {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://mc.yandex.ru https://mc.yandex.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://mc.yandex.ru https://mc.yandex.com; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com wss://mc.yandex.com; frame-src 'none'; frame-ancestors 'self' https://web.telegram.org https://*.web.telegram.org; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # Статические изображения — кэш 7 дней
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://mc.yandex.ru https://mc.yandex.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://mc.yandex.ru https://mc.yandex.com; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com wss://mc.yandex.com; frame-src 'none'; frame-ancestors 'self' https://web.telegram.org https://*.web.telegram.org; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # Запрет кэширования JSON и HTML
    location ~* \.(json|html)$ {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://mc.yandex.ru https://mc.yandex.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://mc.yandex.ru https://mc.yandex.com; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com wss://mc.yandex.com; frame-src 'none'; frame-ancestors 'self' https://web.telegram.org https://*.web.telegram.org; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # API proxy
    location /api/ {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin pages
    location /admin/ {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files proxy
    location / {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
